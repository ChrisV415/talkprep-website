<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Default title/description (overridden per-page by react-helmet-async) -->
    <title>TalkPrep — Walk Into Every Hard Conversation Ready</title>
    <meta name="description" content="TalkPrep gives you word-for-word scripts, anticipates every response, and lets you practice before the real thing. AI-powered prep for resignations, raises, family talks, and more." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#f9f5ef" />

    <!-- Canonical (overridden per-page) -->
    <link rel="canonical" href="https://talkprep.co/" />

    <!-- Favicon & Manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph defaults -->
    <meta property="og:site_name" content="TalkPrep" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://talkprep.co/" />
    <meta property="og:title" content="TalkPrep — Walk Into Every Hard Conversation Ready" />
    <meta property="og:description" content="Word-for-word scripts, anticipated responses, and AI role-play practice for the conversations that matter most." />
    <meta property="og:image" content="https://talkprep.co/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:secure_url" content="https://talkprep.co/opengraph.jpg" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@talkprep" />
    <meta name="twitter:creator" content="@talkprep" />
    <meta name="twitter:title" content="TalkPrep — Walk Into Every Hard Conversation Ready" />
    <meta name="twitter:description" content="Word-for-word scripts, anticipated responses, and AI role-play practice for the conversations that matter most." />
    <meta name="twitter:image" content="https://talkprep.co/opengraph.jpg" />

    <!-- Google Search Console verification -->
    <meta name="google-site-verification" content="GA7m_ZnfyYPuMkiHrOwmKoSQRKsKNlxthhv1mRJPK38" />

    <!-- Fonts — preconnect + preload for LCP improvement -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.pexels.com" />
    <link rel="preconnect" href="https://plus.unsplash.com" />
    <!-- Preload the font stylesheet so the browser discovers font URLs earlier -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />

    <!-- Website JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TalkPrep",
      "url": "https://talkprep.co",
      "description": "AI-powered conversation prep for resignations, raises, family talks, and every hard conversation that matters.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://talkprep.co/blog?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Organization JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TalkPrep",
      "url": "https://talkprep.co",
      "logo": "https://talkprep.co/favicon.svg",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "hello@talkprep.co",
        "contactType": "customer support"
      }
    }
    </script>

    <!-- SoftwareApplication JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TalkPrep",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web",
      "url": "https://talkprep.co",
      "description": "AI-powered preparation tool for difficult conversations. Get exact scripts, practice with AI role-play, and walk in ready.",
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "4.99",
        "highPrice": "79",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JZGC67Y7WS"></script>

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-JZGC67Y7WS');

  </head>

</html>
