kind = "web"
previewPath = "/"
title = "TalkPrep — How to Resign"
version = "1.0.0"
id = "artifacts/talkprep"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20294

[services.development]
run = "pnpm --filter @workspace/talkprep run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/talkprep", "run", "build" ]
publicDir = "artifacts/talkprep/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20294"
BASE_PATH = "/"
